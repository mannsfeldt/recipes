<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Archive</title>
<!--
  ============================================================================
  RECIPE ARCHIVE INDEX — v1
  ============================================================================
  HOW TO ADD A NEW RECIPE:
  1. Find the <section class="category"> matching the recipe's category.
     If the category doesn't exist yet, copy an entire <section class="category">
     block, change the h2 text and the id on the section, and place it in
     alphabetical order among the other category sections.
  2. Inside that section's <ul class="recipe-list">, add one <li>:
       <li><a href="FILENAME.html">Recipe Title</a></li>
     Keep entries within a category in alphabetical order.
  3. Save. No build step, no other files to touch — this is the whole index.
  ============================================================================
-->
<style>
  :root {
    --paper: #F3F4EF;
    --paper-panel: #EAE7DC;
    --ink: #2B2A28;
    --ink-soft: #6B675E;
    --rule: #D6D2C4;
    --herb: #3F5D4A;
    --herb-soft: #E4EAE3;
    --spice: #A8722E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 24px 64px; }

  header { border-bottom: 2px solid var(--ink); padding-bottom: 24px; margin-bottom: 32px; }

  h1 {
    margin: 0 0 8px;
    font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    font-size: clamp(2rem, 4vw, 2.75rem);
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .dek { margin: 0; max-width: 60ch; color: var(--ink-soft); font-size: 1.02rem; }

  .category { margin: 0 0 36px; }

  h2 {
    margin: 0 0 14px;
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--herb);
  }

  ul.recipe-list { list-style: none; margin: 0; padding: 0; }

  .recipe-list li {
    border-bottom: 1px dashed var(--rule);
  }

  .recipe-list li:first-child { border-top: 1px dashed var(--rule); }

  .recipe-list a {
    display: block;
    padding: 12px 14px;
    color: var(--ink);
    text-decoration: none;
    font-size: 1rem;
    background: var(--paper-panel);
    transition: background 0.15s ease;
  }

  .recipe-list a:hover,
  .recipe-list a:focus-visible {
    background: var(--herb-soft);
  }

  .recipe-list a::before {
    content: "—";
    color: var(--herb);
    font-weight: 700;
    margin-right: 10px;
  }

  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Recipe Archive</h1>
    <p class="dek">Family recipes and reformatted favourites, stored as standalone offline-ready cards.</p>
  </header>

  <section class="category" id="baked-goods">
    <h2>Baked Goods</h2>
    <ul class="recipe-list">
      <li><a href="lemon-cranberry-scones.html">Lemon Cranberry Scones with Lemon Glaze</a></li>
    </ul>
  </section>

  <footer>
    <p>Standard format v2 · updated as recipes are added.</p>
  </footer>

</div>

</body>
</html>
